{% extends 'base.html' %}

{% block title %}Error - AeroForm Automatrix{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 3rem auto; padding: 2.5rem; background: var(--secondary-white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); text-align: center; border-top: 5px solid #d32f2f;">
  <div style="font-size: 3rem; color: #d32f2f; margin-bottom: 1rem;">
    ⚠️
  </div>
  <h2 style="color: var(--primary-navy); margin-bottom: 1rem; font-weight: 700;">Something Went Wrong</h2>
  <p style="color: var(--text-muted); font-size: 1rem; line-height: 1.6; margin-bottom: 2rem;">
    {{ message or "Something went wrong generating your document. Please check your form entries and try again." }}
  </p>
  <div>
    <a href="javascript:history.back()" class="btn btn-primary" style="padding: 0.6rem 1.5rem; text-decoration: none;">
      Go Back / वापस जाएं
    </a>
  </div>
</div>
{% endblock %}
