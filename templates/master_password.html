<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Documents — Password</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

        .header {
            background: #1a3c6e;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .btn-back {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }

        .container {
            max-width: 420px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.10);
            text-align: center;
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 20px;
            color: #1a3c6e;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
        }

        input[type="password"] {
            padding: 12px 16px;
            border: 1px solid #dde3ed;
            border-radius: 6px;
            font-size: 15px;
            width: 100%;
            transition: border 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #1a3c6e;
        }

        .btn-unlock {
            width: 100%;
            padding: 13px;
            background: #1a3c6e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-unlock:hover { background: #15305a; }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc3333;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🔒 Master Document Manager</h1>
    <a href="/" class="btn-back">← Dashboard</a>
</div>

<div class="container">
    <div class="card">
        <div class="lock-icon">🔐</div>
        <h2>Password Required</h2>
        <p>This area is restricted. Enter the password to manage master documents.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/masters" method="POST">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       placeholder="Enter password" autofocus required>
            </div>
            <button type="submit" class="btn-unlock">🔓 Unlock</button>
        </form>
    </div>
</div>

</body>
</html>
